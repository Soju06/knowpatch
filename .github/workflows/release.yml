name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.2)"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  build:
    name: Build (npm pack)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, ref: "${{ env.RELEASE_TAG }}" }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.7" }
      - run: bun install --frozen-lockfile
      - name: Verify tag matches package.json version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${RELEASE_TAG#v}"
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "package.json version (${PKG_VERSION}) != tag (${TAG_VERSION})"
            exit 1
          fi
          echo "OK: ${RELEASE_TAG} matches package.json version ${PKG_VERSION}"
      - run: bun run build
      - name: Verify build artifacts
        run: |
          [ -f bin/cli.js ] && [ -f bin/detect.js ] && echo "OK" || exit 1
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with: { name: npm-tarball, path: "knowpatch-*.tgz" }

  publish-to-npm:
    name: Publish to npm
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/knowpatch
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ env.RELEASE_TAG }}" }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.7" }
      - uses: actions/setup-node@v4
        with: { node-version: "22", registry-url: "https://registry.npmjs.org" }
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-github-release:
    name: Create GitHub Release
    needs: [publish-to-npm]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, ref: "${{ env.RELEASE_TAG }}" }
      - uses: actions/download-artifact@v4
        with: { name: npm-tarball, path: dist }
      - name: Resolve previous tag
        id: prev_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${RELEASE_TAG}"
          PREV_TAG=""
          if git describe --tags --abbrev=0 "${TAG_NAME}^" >/dev/null 2>&1; then
            PREV_TAG="$(git describe --tags --abbrev=0 "${TAG_NAME}^")"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.prev_tag.outputs.tag_name }}
          PREV_TAG: ${{ steps.prev_tag.outputs.prev_tag }}
        with:
          script: |
            const fs = require("fs");
            const tag = process.env.TAG_NAME;
            const prev = process.env.PREV_TAG || undefined;
            if (!tag) { core.setFailed("Missing TAG_NAME"); return; }
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner, repo: context.repo.repo,
              tag_name: tag, previous_tag_name: prev,
            });
            fs.writeFileSync("release_notes.md", `${data.body.trimEnd()}\n`);
            core.setOutput("tag_name", tag);
      - name: Append install instructions
        shell: bash
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          {
            echo; echo "## Install / Run"
            echo '```bash'
            echo 'npx knowpatch'
            echo "npm install -g knowpatch@${TAG_VERSION}"
            echo '```'
          } >> release_notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag_name }}
          name: Release ${{ steps.notes.outputs.tag_name }}
          body_path: release_notes.md
          files: "dist/*"
          draft: false
          prerelease: false
