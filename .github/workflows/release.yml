name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.2)"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"
      - name: Verify tag format and version match
        shell: bash
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: ${TAG} (expected vX.Y.Z)"
            exit 1
          fi
          TAG_VERSION="${TAG#v}"
          PKG_VERSION="$(bun -e "console.log(require('./package.json').version)")"
          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "::error::Tag ${TAG_VERSION} ≠ package.json ${PKG_VERSION}"
            exit 1
          fi
          echo "OK: ${TAG} matches package.json ${PKG_VERSION}"

  publish-to-npm:
    name: Publish to npm (Trusted Publishing)
    needs: [validate]
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      id-token: write

    environment:
      name: npm
      url: https://www.npmjs.com/package/knowpatch

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify build artifacts
        run: |
          [ -f bin/cli.js ] && [ -f bin/detect.js ] && echo "OK" || exit 1
      - name: Verify package contents
        run: npm pack --dry-run
      - name: Publish to npm
        run: npm publish --access public

  create-github-release:
    name: Create GitHub Release
    needs: [publish-to-npm]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - name: Resolve previous tag
        id: prev_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${RELEASE_TAG}"
          PREV_TAG=""
          if git describe --tags --abbrev=0 "${TAG_NAME}^" >/dev/null 2>&1; then
            PREV_TAG="$(git describe --tags --abbrev=0 "${TAG_NAME}^")"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.prev_tag.outputs.tag_name }}
          PREV_TAG: ${{ steps.prev_tag.outputs.prev_tag }}
        with:
          script: |
            const fs = require("fs");
            const tag = process.env.TAG_NAME;
            const prev = process.env.PREV_TAG || undefined;
            if (!tag) { core.setFailed("Missing TAG_NAME"); return; }
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner, repo: context.repo.repo,
              tag_name: tag, previous_tag_name: prev,
            });
            fs.writeFileSync("release_notes.md", `${data.body.trimEnd()}\n`);
            core.setOutput("tag_name", tag);
      - name: Append install instructions
        shell: bash
        env:
          TAG_NAME: ${{ steps.prev_tag.outputs.tag_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${TAG_NAME#v}"
          {
            echo
            echo "## Install / Run"
            echo '```bash'
            echo 'npx knowpatch'
            echo "npm install -g knowpatch@${TAG_VERSION}"
            echo '```'
          } >> release_notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag_name }}
          name: Release ${{ steps.notes.outputs.tag_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
